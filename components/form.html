<section id="contact" class="py-20 md:py-32 bg-white">
    <div class="container mx-auto px-4 md:px-6">
        <div
            class="bg-white rounded-[2rem] md:rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden reveal">
            <div class="flex flex-col lg:flex-row">
                <!-- Left Contact Info -->
                <div
                    class="w-full lg:w-5/12 p-8 md:p-12 lg:p-16 bg-guardian-dark text-white relative overflow-hidden">
                    <div class="relative z-10">
                        <span
                            class="text-guardian-primary font-bold tracking-widest uppercase mb-4 block text-sm">Contact
                            Us</span>
                        <h2 class="font-heading text-3xl md:text-4xl font-bold mb-6">Let's Secure Your Business
                            Future</h2>
                        <p class="text-slate-400 text-base mb-12">Ready to elevate your customer experience? Fill
                            out the form and our solutions team will be in touch within 24 hours.</p>

                        <div class="space-y-8">
                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-guardian-primary shrink-0">
                                    <i data-lucide="mail" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <span class="block text-sm text-slate-400 mb-1">Email Us</span>
                                    <span class="font-medium break-all">solutions@guardianbpo.com</span>
                                </div>
                            </div>
                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-guardian-primary shrink-0">
                                    <i data-lucide="phone" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <span class="block text-sm text-slate-400 mb-1">Call Us</span>
                                    <span class="font-medium">+1 (888) 123-4567</span>
                                </div>
                            </div>
                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-guardian-primary shrink-0">
                                    <i data-lucide="map-pin" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <span class="block text-sm text-slate-400 mb-1">Global HQs</span>
                                    <span class="font-medium leading-relaxed">77 Global Plaza, Manila, PH<br>London,
                                        United Kingdom</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Abstract Background Art -->
                    <div
                        class="absolute bottom-0 right-0 w-64 h-64 bg-guardian-primary/20 rounded-full blur-[80px] -mr-32 -mb-32">
                    </div>
                    <div
                        class="absolute top-0 left-0 w-64 h-64 bg-indigo-500/20 rounded-full blur-[80px] -ml-32 -mt-32">
                    </div>
                </div>

                <!-- Right Form Container -->
                <div class="w-full lg:w-7/12 p-8 md:p-12 lg:p-16 bg-slate-50">
                    <form action="#" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">First Name *</label>
                                <input type="text"
                                    class="w-full px-5 py-4 rounded-xl bg-white border border-slate-200 focus:border-guardian-primary focus:ring-1 focus:ring-guardian-primary transition-all outline-none"
                                    placeholder="John" required>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Last Name *</label>
                                <input type="text"
                                    class="w-full px-5 py-4 rounded-xl bg-white border border-slate-200 focus:border-guardian-primary focus:ring-1 focus:ring-guardian-primary transition-all outline-none"
                                    placeholder="Doe" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Work Email *</label>
                                <input type="email"
                                    class="w-full px-5 py-4 rounded-xl bg-white border border-slate-200 focus:border-guardian-primary focus:ring-1 focus:ring-guardian-primary transition-all outline-none"
                                    placeholder="john@company.com" required>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                                <input type="tel"
                                    class="w-full px-5 py-4 rounded-xl bg-white border border-slate-200 focus:border-guardian-primary focus:ring-1 focus:ring-guardian-primary transition-all outline-none"
                                    placeholder="+1 (234) 567-890">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Company Name</label>
                                <input type="text"
                                    class="w-full px-5 py-4 rounded-xl bg-white border border-slate-200 focus:border-guardian-primary focus:ring-1 focus:ring-guardian-primary transition-all outline-none"
                                    placeholder="Your Business Ltd.">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Expected Team
                                    Size</label>
                                <select
                                    class="w-full px-5 py-4 rounded-xl bg-white border border-slate-200 focus:border-guardian-primary focus:ring-1 focus:ring-guardian-primary transition-all outline-none appearance-none text-slate-700">
                                    <option value="" disabled selected>Select size</option>
                                    <option>1 - 10 Agents</option>
                                    <option>11 - 50 Agents</option>
                                    <option>51 - 100+ Agents</option>
                                    <option>Not sure yet</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Primary Service
                                Interest</label>
                            <select
                                class="w-full px-5 py-4 rounded-xl bg-white border border-slate-200 focus:border-guardian-primary focus:ring-1 focus:ring-guardian-primary transition-all outline-none appearance-none text-slate-700">
                                <option>Customer Support</option>
                                <option>Tech Helpdesk</option>
                                <option>Sales & Lead Generation</option>
                                <option>Back Office / Data Entry</option>
                                <option>Multiple / Other</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Project Details</label>
                            <textarea rows="4"
                                class="w-full px-5 py-4 rounded-xl bg-white border border-slate-200 focus:border-guardian-primary focus:ring-1 focus:ring-guardian-primary transition-all outline-none resize-none"
                                placeholder="Briefly tell us about your requirements..."></textarea>
                        </div>

                        <button type="submit"
                            class="w-full py-5 bg-guardian-primary hover:bg-blue-600 text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-500/20 transform hover:scale-[1.02] flex justify-center items-center gap-2">
                            Request Free Proposal
                            <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
